on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      sign:
        required: true
        type: boolean
    secrets:
      signpath_api_key:
        required: false

env:
  BUILD_VERSION: ${{ inputs.version }}

jobs:
  rainmeter-32:
    runs-on: windows-2022
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Build 32-bit Rainmeter
        run: cd Build && Build.bat rainmeter-32 %BUILD_VERSION:~1%
        shell: cmd

      - name: Upload 32-bit build
        uses: actions/upload-artifact@v7
        with:
          name: x32-Release
          path: |
            x32-Release
            !x32-Release/Obj
          if-no-files-found: error

  rainmeter-64:
    runs-on: windows-2022
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Build 64-bit Rainmeter
        run: cd Build && Build.bat rainmeter-64 %BUILD_VERSION:~1%
        shell: cmd

      - name: Upload 64-bit build
        uses: actions/upload-artifact@v7
        with:
          name: x64-Release
          path: |
            x64-Release
            !x64-Release/Obj
          if-no-files-found: error

  installer:
    needs: [rainmeter-32, rainmeter-64]
    runs-on: windows-2022
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Download 32-bit & 64-bit builds
        uses: actions/download-artifact@v8
        with:
          pattern: x*-Release

      - name: Upload combined build
        uses: actions/upload-artifact@v7
        id: upload-build
        with:
          name: RainmeterBuild-${{ inputs.version }}
          path: |
            x32-Release
            x64-Release
          if-no-files-found: error

      - name: Remove build directories
        if: inputs.sign
        run: rm -rf {x32,x64}-Release
        shell: bash

      - name: Sign Rainmeter
        if: inputs.sign
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: '${{ secrets.signpath_api_key }}'
          organization-id: '2d37d539-98b7-4649-9469-4097b1099202'
          project-slug: 'rainmeter'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'zip'
          github-artifact-id: '${{ steps.upload-build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: .

      - name: Install NSIS
        run: choco install nsis --version=3.12.0 --no-progress

      - name: Build installer
        run: cd Build && Build.bat installer %BUILD_VERSION:~1%
        shell: cmd

      - name: Upload installer
        uses: actions/upload-artifact@v7
        id: upload-installer
        with:
          path: Build/Rainmeter-*.exe
          archive: false
          if-no-files-found: error

      - name: Sign installer
        if: inputs.sign
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: '${{ secrets.signpath_api_key }}'
          organization-id: '2d37d539-98b7-4649-9469-4097b1099202'
          project-slug: 'rainmeter'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe'
          github-artifact-id: '${{ steps.upload-installer.outputs.artifact-id }}'
          wait-for-completion: false
